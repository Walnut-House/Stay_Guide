<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WALNUT HOUSE · Guest Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F6F0E3;
    --paper:#FDFBF4;
    --ink:#2A2620;
    --soft-ink:#5C564B;
    --walnut:#9A744A;
    --walnut-deep:#6E4F2E;
    --forest:#2F4A3D;
    --line:#E4DBC7;
    --muted:#988F79;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;
    background:
      radial-gradient(125% 75% at 50% -8%, #FBF7EC 0%, var(--cream) 55%, #EEE5D2 100%);
    color:var(--ink);
    font-family:"Gowun Dodum",sans-serif;
    line-height:1.8;
    -webkit-font-smoothing:antialiased;
    padding:0 20px 70px;
    display:flex;flex-direction:column;align-items:center;
  }
  .wrap{max-width:560px;width:100%}

  /* HERO */
  .hero{text-align:center;padding:70px 10px 40px}
  .eyebrow{
    font-family:"Fraunces",serif;letter-spacing:.42em;text-transform:uppercase;
    font-size:12px;color:var(--walnut);margin-bottom:26px;
  }
  .eyebrow::before,.eyebrow::after{
    content:"";display:inline-block;width:30px;height:1px;background:var(--walnut);
    vertical-align:middle;margin:0 13px 4px;
  }
  .welcome{
    font-family:"Fraunces",serif;font-style:italic;font-weight:400;
    font-size:54px;line-height:1;color:var(--forest);margin-bottom:20px;
  }
  h1{
    font-family:"Fraunces",serif;font-weight:500;font-size:26px;
    letter-spacing:.22em;color:var(--ink);margin-bottom:24px;
  }
  .tagline{
    font-family:"Fraunces",serif;font-style:italic;font-size:16px;
    color:var(--soft-ink);line-height:1.7;
  }
  .tagline .kr{
    display:block;font-family:"Gowun Batang",serif;font-style:normal;
    font-size:14px;color:var(--muted);margin-top:14px;letter-spacing:.1em;
  }
  .dot-rule{display:flex;align-items:center;justify-content:center;gap:13px;margin:34px 0 0}
  .dot-rule span{height:1px;width:100px;background:linear-gradient(90deg,transparent,var(--line))}
  .dot-rule span:last-child{background:linear-gradient(90deg,var(--line),transparent)}
  .dot-rule b{width:5px;height:5px;border-radius:50%;background:var(--walnut)}

  /* WIFI */
  .wifi{
    background:var(--paper);border:1px solid var(--line);border-radius:16px;
    padding:22px 24px;margin:8px 0 30px;
    box-shadow:0 14px 30px -24px rgba(60,42,20,.5);
    display:flex;align-items:center;gap:20px;
  }
  .wifi .ic{flex:0 0 44px;width:44px;height:44px}
  .wifi .ic svg{width:44px;height:44px;stroke:var(--forest);stroke-width:1.6;fill:none;stroke-linecap:round}
  .wifi .info{flex:1}
  .wifi .lbl{
    font-family:"Fraunces",serif;letter-spacing:.28em;text-transform:uppercase;
    font-size:10px;color:var(--walnut);margin-bottom:6px;
  }
  .wifi .pair{display:flex;gap:22px;flex-wrap:wrap}
  .wifi .pair div span{display:block;font-size:11px;color:var(--muted);letter-spacing:.05em}
  .wifi .pair div b{font-family:"Fraunces",serif;font-size:19px;color:var(--walnut-deep);font-weight:500}

  /* LANGUAGE SELECT */
  .sel-label{
    text-align:center;font-family:"Gowun Batang",serif;color:var(--soft-ink);
    font-size:14px;letter-spacing:.06em;margin-bottom:18px;
  }
  .sel-label .en{display:block;font-family:"Fraunces",serif;font-style:italic;font-size:13px;color:var(--muted);margin-top:2px}

  .langs{display:flex;flex-direction:column;gap:12px}
  .lang{
    display:flex;align-items:center;gap:16px;
    background:var(--paper);border:1px solid var(--line);border-radius:14px;
    padding:18px 22px;text-decoration:none;color:var(--ink);
    box-shadow:0 10px 24px -22px rgba(60,42,20,.5);
    position:relative;overflow:hidden;
    transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
  }
  .lang::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
    background:var(--walnut);transform:scaleY(0);transform-origin:top;
    transition:transform .25s ease;
  }
  .lang:hover{transform:translateY(-2px);border-color:var(--walnut);box-shadow:0 16px 30px -20px rgba(60,42,20,.55)}
  .lang:hover::before{transform:scaleY(1)}
  .lang .glyph{
    flex:0 0 auto;font-family:"Gowun Batang",serif;font-weight:700;
    font-size:24px;color:var(--forest);min-width:104px;letter-spacing:.02em;
  }
  .lang .meta{flex:1}
  .lang .meta .name{font-family:"Fraunces",serif;font-size:15px;color:var(--ink)}
  .lang .meta .sub{font-size:12px;color:var(--muted);letter-spacing:.04em}
  .lang .arrow{
    flex:0 0 auto;color:var(--walnut);font-size:20px;
    transition:transform .25s ease;
  }
  .lang:hover .arrow{transform:translateX(5px)}

  /* FOOTER */
  .footer{text-align:center;padding:48px 0 0;color:var(--muted)}
  .footer .mark{font-family:"Fraunces",serif;letter-spacing:.3em;color:var(--walnut);font-size:13px}
  .footer .loc{font-family:"Fraunces",serif;letter-spacing:.25em;font-size:11px;margin-top:8px;text-transform:uppercase}

  /* entrance */
  .fade{opacity:0;transform:translateY(12px);animation:rise .7s forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .d1{animation-delay:.05s}.d2{animation-delay:.12s}.d3{animation-delay:.18s}
  .d4{animation-delay:.24s}.d5{animation-delay:.30s}.d6{animation-delay:.36s}.d7{animation-delay:.42s}

  @media(max-width:440px){
    .welcome{font-size:44px}
    .wifi{flex-direction:column;align-items:flex-start;gap:14px}
    .lang .glyph{min-width:88px;font-size:21px}
  }
</style>

<div class="wrap">

  <header class="hero">
    <div class="eyebrow fade d1">Stay Guide</div>
    <div class="welcome fade d2">Welcome</div>
    <h1 class="fade d2">WALNUT&nbsp;HOUSE</h1>
    <p class="tagline fade d3">
      This is the part of Seoul where people actually live.<br>For tonight, you're one of them.
      <span class="kr">— 오늘 밤은 이 동네 사람으로 —</span>
    </p>
    <div class="dot-rule fade d3"><span></span><b></b><span></span></div>
  </header>
    </div>
  </div>

  <!-- LANGUAGE SELECT -->
  <div class="sel-label fade d5">
    안내를 받으실 언어를 선택해 주세요
    <span class="en">Select your language · 言語を選択 · 选择语言</span>
  </div>

  <nav class="langs">
    <a class="lang fade d5" href="ko.html">
      <span class="glyph">한국어</span>
      <span class="meta"><span class="sub">한국어 안내</span></span>
      <span class="arrow">→</span>
    </a>
    <a class="lang fade d6" href="en.html">
      <span class="glyph">English</span>
      <span class="meta"><span class="sub">English Guide</span></span>
      <span class="arrow">→</span>
    </a>
    <a class="lang fade d6" href="ja.html">
      <span class="glyph">日本語</span>
      <span class="meta"><span class="sub">日本語ご案内</span></span>
      <span class="arrow">→</span>
    </a>
    <a class="lang fade d7" href="zh.html">
      <span class="glyph">中文</span>
      <span class="meta"><span class="sub">中文指南</span></span>
      <span class="arrow">→</span>
    </a>
  </nav>

  <footer class="footer">
    <div class="mark">WALNUT HOUSE</div>
    <div class="loc">Jongno · Seoul</div>
  </footer>

</div>
